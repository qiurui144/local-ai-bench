# Target Pool — 平台/架构/连接/运行时注册表
# 所有 IP/密码通过 env var 注入，禁止硬编码（§1.4）
targets:
  local:
    platform: linux
    arch: x86_64
    connection: local
    runtime: vllm

  amd-win-x86:
    platform: windows
    arch: x86_64
    connection: ssh
    ip_env: AMD_HOST              # 从 env 读
    ssh_user_env: AMD_SSH_USER
    ssh_pass_env: AMD_SSH_PASS
    runtime: ollama
    runtime_port: 11434
    accelerator: vulkan           # 780M iGPU via Ollama Vulkan backend
    accelerator_profiles: [cpu, vulkan, directml, amd-xdna]
    npu: amd-xdna                 # XDNA NPU; driver v32.0.20101.3760 已就绪; onnxruntime-vitisai 依赖闭源 vai_rt，不可自编译，需从 AMD 开发者门户下载 RyzenAI SDK; 替代: onnxruntime-directml 1.24.4 (GPU DirectX 12) 已安装 (2026-06-17)
    env_overrides:
      OLLAMA_AMD_BASE_URL: http://localhost:11434/v1
      LEMONADE_AMD_BASE_URL: http://localhost:8000/v1  # Lemonade NPU LLM server（lemonade-server serve）
      ORT_AMD_EXTRAS_BASE_URL: http://localhost:8091/v1
    remote_workdir: "C:\\Users\\happy\\vlm-llm-benchmark"
    python_cmd: "C:\\Users\\happy\\AppData\\Local\\Programs\\Python\\Python311\\python.exe"

  amd-linux-x86:
    platform: linux
    arch: x86_64
    connection: ssh
    ip_env: AMD_LINUX_HOST
    ssh_user_env: AMD_LINUX_SSH_USER
    ssh_pass_env: AMD_LINUX_SSH_PASS
    runtime: ollama
    runtime_port: 11434
    accelerator: vulkan
    accelerator_profiles: [cpu, vulkan]
    env_overrides:
      OLLAMA_AMD_LINUX_BASE_URL: http://localhost:11434/v1
    remote_workdir: "/home/qiurui/vlm-llm-benchmark"
    python_cmd: "/home/qiurui/vlm-llm-benchmark/.venv/bin/python"
    notes: "AMD Ryzen 7 8845H + Radeon 780M Linux target; Ollama local endpoint on 127.0.0.1:11434."

  rk3588-linux:
    platform: linux
    arch: aarch64
    connection: ssh
    ip_env: RK3588_HOST              # 192.168.100.206
    ssh_user_env: RK3588_USER        # linaro
    ssh_pass_env: RK3588_PASS        # linaro
    runtime: rknn                    # RK3588 内置 RKNPU3；embedding 服务 uvicorn port 18080
    runtime_port: 18080              # embedding 服务端口（/userdata/model_hub/embedding/server.py）
    accelerator: rknn-npu
    accelerator_profiles: [cpu, mali-g610, rknn-npu]
    mali_gpu: mali-g610
    npu: rk3588-npu                  # 内置 RKNPU3（3×2 TOPS = 6 TOPS）；仅运行 embedding
    remote_workdir: "/userdata/vlm-llm-benchmark"
    python_cmd: "python3"
    notes: "Rock 5B / OrangePi 5+；RK3588 内置 RKNPU3（3×2 TOPS）运行 embedding（port 18080）；RK1820 PCIe NPU 运行 LLM/ASR/TTS（port 18001/18002/18003）；16GB LPDDR5"

  rk182x-linux:
    platform: linux
    arch: aarch64
    connection: ssh
    ip_env: RK3588_HOST              # 同 RK3588 主机（192.168.100.206），PCIe 挂载 RK1820 NPU
    ssh_user_env: RK3588_USER
    ssh_pass_env: RK3588_PASS
    runtime: rkllm3                  # RK1820 PCIe NPU 独立 rkllm3-server；LLM/ASR/TTS 端口分别 18001/18002/18003
    runtime_port: 18001              # rkllm3-server LLM 端口（-c 768 --n_predict 512 --top-k 1 --qwenvl）
    accelerator: rk1820-npu          # PCI 182a = Rockchip RK1820 NPU（Device 0003:31:00.0）；官方名: RK1820（RKNN3 SDK V0.3.0b0）
    accelerator_profiles: [cpu, rk1820-npu, rknn3]
    remote_workdir: "/userdata/vlm-llm-benchmark"
    python_cmd: "python3"
    notes: "Rockchip RK1820 PCIe NPU（lspci: 0003:31:00.0 Device 182a；系统别名 rk1828）；官方 SDK 名 RK1820（RKNN3 SDK V0.3.0b0 2025-09-12）；与 RK3588 共机器（同 IP/SSH）；LLM via rkllm3-server port 18001；ASR port 18002（POST /asr/transcribe）；TTS port 18003；embedding 由 RK3588 RKNPU3 提供（port 18080）"

  k3-riscv:
    platform: linux
    arch: riscv64
    connection: ssh
    ip_env: K3_HOST
    ssh_user_env: K3_USER
    ssh_pass_env: K3_PASS
    runtime: llama_cpp
    runtime_port: 11434
    accelerator: cpu
    accelerator_profiles: [cpu, rvv, ime2]
    remote_workdir: "/root/local-ai-bench"
    python_cmd: "python3"
    notes: "兼容别名：进迭时空 SpacemiT K3 16GB；新增模型必须使用 k3-riscv-16g 或 k3-riscv-8g，避免不同内存容量混跑。"

  k3-riscv-16g:
    platform: linux
    arch: riscv64
    connection: ssh
    ip_env: K3_HOST
    ssh_user_env: K3_USER
    ssh_pass_env: K3_PASS
    runtime: llama_cpp
    runtime_port: 11434
    accelerator: cpu
    accelerator_profiles: [cpu, rvv, ime2]
    remote_workdir: "/root/local-ai-bench"
    python_cmd: "python3"
    notes: "进迭时空 SpacemiT K3（X100+A100 异构，8核 RISC-V RVV 0.7.1 + IME2 NPU，16GB）；Bianbu Linux；llama-server v8355（/usr/bin/llama-server）RVV+IME2 编译；port 11434=3B，8081=1.5B，8082=0.5B，11435=7B。"

  k3-riscv-32g:
    platform: linux
    arch: riscv64
    connection: ssh
    ip_env: K3_32G_HOST
    ssh_user_env: K3_32G_USER
    ssh_pass_env: K3_32G_PASS
    runtime: llama_cpp
    runtime_port: 18080
    accelerator: cpu
    accelerator_profiles: [cpu, rvv, ime2]
    env_overrides:
      K3_32G_QWEN36_BASE_URL: http://localhost:18080/v1
      K3_32G_QWEN30B_BASE_URL: http://localhost:18082/v1
      K3_32G_QWEN30B_VLM_BASE_URL: http://localhost:18084/v1
      K3_32G_QWEN35B_BASE_URL: http://localhost:18100/v1
      K3_32G_LFM2_24B_BASE_URL: http://localhost:18120/v1
      K3_32G_QWEN3_8B_BASE_URL: http://localhost:18122/v1
    remote_workdir: "/root/local-ai-bench"
    python_cmd: "python3"
    notes: "进迭时空 SpacemiT K3 32GB 内存档；重点覆盖 SpacemiT model_zoo Qwen3.6-35B-A3B-UD-Q4_K_XL，顺序单实例运行，避免与 16GB 报告混用。"

  k3-riscv-8g:
    platform: linux
    arch: riscv64
    connection: ssh
    ip_env: K3_8G_HOST
    ssh_user_env: K3_8G_USER
    ssh_pass_env: K3_8G_PASS
    runtime: llama_cpp
    runtime_port: 11434
    accelerator: cpu
    accelerator_profiles: [cpu, rvv, ime2]
    env_overrides:
      K3_8G_LLM_BASE_URL: http://localhost:11434/v1
    remote_workdir: "/root/local-ai-bench"
    python_cmd: "python3"
    notes: "进迭时空 SpacemiT K3 8GB 内存档；仅登记 0.5B/1B/1.5B 等低内存 GGUF，避免与 16GB 的 3B/7B 配置混用。"

  k1-riscv:
    platform: linux
    arch: riscv64
    connection: ssh
    ip_env: K1_HOST
    ssh_user_env: K1_USER
    ssh_pass_env: K1_PASS
    runtime: llama_cpp
    runtime_port: 8081               # 与 K3 端口区分，便于同机跑两实例
    accelerator: cpu
    remote_workdir: "/home/bianbu/local-ai-bench-k1"
    python_cmd: "python3"
    notes: "进迭时空 SpacemiT K1（BPI-F3/Muse-Pi，8核 RISC-V RVV 0.7.1）；同 K3 架构但配置 / 频率不同"

  jetson-agx:
    platform: linux
    arch: aarch64
    connection: ssh
    ip_env: JETSON_HOST
    ssh_user_env: JETSON_USER
    ssh_pass_env: JETSON_PASS
    runtime: ollama
    runtime_port: 11434
    accelerator: cuda
    remote_workdir: "/home/user/local-ai-bench"
    python_cmd: "python3"

  intel-win-x86:
    platform: windows
    arch: x86_64
    connection: ssh
    ip_env: INTEL_WIN_HOST
    ssh_user_env: INTEL_WIN_SSH_USER
    ssh_pass_env: INTEL_WIN_SSH_PASS
    runtime: ollama
    runtime_port: 11434
    accelerator: cpu
    accelerator_profiles: [cpu, directml, openvino-gpu, intel-ai-boost-npu]
    npu: intel-ai-boost
    env_overrides:
      OLLAMA_INTEL_WIN_BASE_URL: http://localhost:11434/v1
      OV_INTEL_BASE_URL: http://localhost:8080/v1
      OV_EXTRAS_INTEL_BASE_URL: http://localhost:8081/v1
      OV_INTEL_QWEN3_06B_BASE_URL: http://localhost:8082/v1
      OV_INTEL_QWEN3_17B_BASE_URL: http://localhost:8083/v1
      OV_INTEL_QWEN3_4B_BASE_URL: http://localhost:8084/v1
      OV_INTEL_QWEN25_7B_BASE_URL: http://localhost:8085/v1
    remote_workdir: "C:\\Users\\happy\\vlm-llm-benchmark"
    python_cmd: "python.exe"

  intel-linux:
    platform: linux
    arch: x86_64
    connection: ssh
    ip_env: INTEL_LINUX_HOST
    ssh_user_env: INTEL_LINUX_SSH_USER
    ssh_pass_env: INTEL_LINUX_SSH_PASS
    runtime: generic          # OpenAI-compatible accelerated runtime by default; Ollama CPU is explicit baseline only
    runtime_port: 8080
    accelerator: openvino-gpu
    accelerator_profiles: [openvino-gpu, openvino-cpu, cpu]
    env_overrides:
      OLLAMA_INTEL_LINUX_BASE_URL: http://localhost:11434/v1
      OV_INTEL_LINUX_BASE_URL: http://localhost:8080/v1
      INTEL_LINUX_BASE_URL: http://localhost:8080/v1
    remote_workdir: "/home/user/local-ai-bench"
    python_cmd: "python3"
    notes: "Intel x86_64 Linux target; normal LLM/VLM runs use an accelerator-backed OpenAI-compatible endpoint such as OpenVINO/vLLM. Ollama CPU LLM/VLM runs require explicit CPU-baseline labeling."
