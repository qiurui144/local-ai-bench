  # ═══ SpacemiT K3 RISC-V（llama.cpp RVV，riscv64，进迭时空 X100，16GB）═══
  # 硬件：K3_HOST/K3_USER 指向的 SpacemiT X100（8核 RVV，16GB LPDDR5）
