# Model matrix for VLM + LLM benchmarking across local GPU nodes AND cloud API providers.
#
# Two kinds of entries — all live in the same models: list:
#
#   Local (vLLM / Ollama)   Cloud API (OpenAI-compatible)
#   ─────────────────────   ─────────────────────────────
#   hf_repo (required)      provider: deepseek|dashscope|openai|ollama|generic
#   port (required)         model_id: <api-catalog-name>   (e.g. "deepseek-chat")
#   vram_estimate_gb        api_key_env: ENV_VAR_NAME       (key read at runtime, never committed)
#                           base_url_override: <url>        (optional; wins over provider routing)
#
# The harness derives base_url and auth header automatically from these fields.
# Cloud model keys injected at runtime: export DEEPSEEK_API_KEY=sk-... etc.
#
# Default port allocation (local GPU):
#   8001-8003  VLM (vision tasks)
#   9001-9003  LLM (text completion / chat)

models:
  # ═══════════════════ VLM ═══════════════════

  - name: qwen3-vl-8b-instruct
    hf_repo: Qwen/Qwen3-VL-8B-Instruct
    quantization: null                 # 原生 BF16
    port: 8001
    vram_estimate_gb: 20
    hardware_min: A100-40G
    role: vlm_primary
    dtype: bfloat16
    notes: "🌟 VLM primary — Qwen3-VL flagship (https://huggingface.co/Qwen/Qwen3-VL-8B-Instruct)"

  - name: qwen2.5-vl-7b-fp16
    hf_repo: Qwen/Qwen2.5-VL-7B-Instruct
    quantization: null
    port: 8002
    vram_estimate_gb: 18
    hardware_min: A100-40G
    role: vlm_baseline
    dtype: bfloat16
    notes: "📍 VLM baseline (older but widely deployed)"

  # ═══════════════════ LLM ═══════════════════
  #
  # 不降级到 8B/14B。DGX 主力用 30B MoE（激活 3B，速度媲美 8B）或 235B 旗舰。

  - name: qwen3-30b-a3b-instruct-2507-fp8
    hf_repo: Qwen/Qwen3-30B-A3B-Instruct-2507-FP8
    quantization: fp8
    port: 9001
    vram_estimate_gb: 35
    hardware_min: H100-80G
    role: llm_primary
    task_type: text_only
    translation_capable: true          # 参与 translation 维度（zh<->en）
    notes: "🌟 LLM 首选：30B MoE 官方 FP8，激活 3B 推理快，2507 最新版"

  - name: qwen3-235b-a22b-instruct-2507-fp8
    hf_repo: Qwen/Qwen3-235B-A22B-Instruct-2507-FP8
    quantization: fp8
    port: 9002
    vram_estimate_gb: 240
    hardware_min: 8xH100-80G
    role: llm_ultra_flagship
    task_type: text_only
    translation_capable: true          # 参与 translation 维度（zh<->en）
    notes: "🌟🌟🌟 LLM 旗舰：235B MoE（激活 22B）官方 FP8，需 8×H100"

  # ═════════════ AI-box 检索/语音能力（embedding / rerank / asr）═════════════
  #
  # 这些走 OpenAI 兼容 /v1/embeddings（embedding）或 chat（rerank yes/no）端点。
  # 用 *_capable hint 字段选择性参与对应维度（同 translation_capable 模式）。

  - name: qwen3-embedding-0.6b
    hf_repo: Qwen/Qwen3-Embedding-0.6B
    quantization: null
    port: 9101
    vram_estimate_gb: 4
    hardware_min: A100-40G
    role: embedding_primary
    task_type: text_only
    embedding_capable: true            # 参与 embedding 维度（检索 recall/MRR/nDCG）
    notes: "🌟 Embedding 首选：0.6B，精度-延迟-内存均衡（K23 边缘选型甜点）"

  - name: qwen3-embedding-4b
    hf_repo: Qwen/Qwen3-Embedding-4B
    quantization: null
    port: 9102
    vram_estimate_gb: 12
    hardware_min: A100-40G
    role: embedding_high_accuracy
    task_type: text_only
    embedding_capable: true
    notes: "Embedding 高精度上限：4B，nDCG@10 最高，延迟/内存更重"

  - name: qwen3-reranker-4b
    hf_repo: Qwen/Qwen3-Reranker-4B
    quantization: null
    port: 9201
    vram_estimate_gb: 12
    hardware_min: A100-40G
    role: reranker_primary
    task_type: text_only
    rerank_capable: true               # 参与 rerank 维度（生成式 yes/no 重排）
    notes: "Reranker：生成式 yes/no，重排质量强；单 pair 延迟高（K3 实测 2.9s/pair），宜离线/小 top-k"

  - name: bge-reranker-v2-m3
    hf_repo: BAAI/bge-reranker-v2-m3
    quantization: q8_0                  # 对照可加 q4_k_m（reranker 对量化较敏感，需查 score_separation）
    port: 9202
    vram_estimate_gb: 1
    hardware_min: K3-X100               # encoder-only，X100 CPU + IME2 即可，无需 GPU
    role: reranker_realtime
    task_type: text_only
    rerank_capable: true               # 参与 rerank 维度
    rerank_native: true                # 走 llama.cpp /v1/rerank 单 pass（非生成式 yes/no）
    notes: "🌟 实时 Reranker：BERT cross-encoder 单 pass，GGUF 自带 tokenizer（零 Python tokenizer 依赖）；延迟预期 <<生成式（推断 20-100×，待 163 实测）。起服：llama-server -m bge-reranker-v2-m3.Q8_0.gguf --reranking -t 8 -c 512 --port 9202"

  - name: bge-reranker-base
    hf_repo: BAAI/bge-reranker-base
    quantization: q4_k_m
    port: 9203
    vram_estimate_gb: 1
    hardware_min: K3-X100
    role: reranker_realtime_min         # 延迟下限对照（~278M，更小更快，质量略低）
    task_type: text_only
    rerank_capable: true
    rerank_native: true
    notes: "实时 Reranker 延迟下限对照：bge-reranker-base ~278M，单 pass，给产品「质量 vs 延迟」选择曲线"

  # ─── OCR（印刷文字识别）──────────────────────────────────────────────────────
  #
  # 后端优先级（auto）：VitisAI NPU → rapidocr-onnxruntime(CPU) → paddleocr(CPU)
  # NPU 路径：AMD XDNA（Ryzen AI SDK + VitisAIExecutionProvider）；ocr_model_dir 可选
  # CPU 路径：rapidocr-onnxruntime 自动下载 PP-OCRv4 ONNX 模型（~10 MB）

  - name: rapidocr-cpu
    provider: local_onnx
    port: 0                          # 本地 ONNX，无 HTTP 端点
    role: ocr_cpu_baseline
    task_type: text_only
    ocr_capable: true
    ocr_backend: rapidocr
    notes: "OCR CPU 基线：rapidocr-onnxruntime (PP-OCRv4 ONNX)"

  - name: paddleocr-cpu
    provider: local_onnx
    port: 0
    role: ocr_cpu_paddle
    task_type: text_only
    ocr_capable: true
    ocr_backend: paddleocr
    notes: "OCR CPU PaddleOCR v4（已本地安装）"

  - name: rapidocr-amd-npu
    provider: local_onnx
    port: 0
    target: amd-win-x86             # 必须在 AMD Windows 机器上执行（VitisAI EP 依赖 RyzenAI SDK）
    role: ocr_npu
    task_type: text_only
    ocr_capable: true
    ocr_backend: vitisai             # AMD XDNA NPU via VitisAI EP；无 SDK 时返回 BLOCKED
    notes: "OCR NPU：RapidOCR PP-OCRv4 管线 + RyzenAI Python 3.12 + VitisAIExecutionProvider；需 RyzenAI 1.7.1、numpy<2、voe、RapidOCR 依赖；无 EP 或 provider 未绑定时 BLOCKED"

  - name: rapidocr-amd-directml
    provider: local_onnx
    port: 0
    target: amd-win-x86             # 在 AMD Windows 机器上执行
    role: ocr_gpu_directml
    task_type: text_only
    ocr_capable: true
    ocr_backend: directml            # AMD Radeon 780M GPU via DirectML EP（onnxruntime-directml 1.24.4 已安装）
    notes: "OCR GPU DirectML：rapidocr + onnxruntime-directml 1.24.4 (Radeon 780M via DirectX 12)；PP-OCRv4 ONNX (2026-06-17 安装完成)"

  - name: rapidocr-intel-directml
    provider: local_onnx
    port: 0
    target: intel-win-x86
    role: ocr_gpu_directml
    task_type: text_only
    ocr_capable: true
    ocr_backend: directml
    notes: "Intel Windows OCR GPU/Windows ML path：RapidOCR + onnxruntime-directml；无 DmlExecutionProvider 时 BLOCKED"

  - name: rapidocr-intel-openvino
    provider: local_onnx
    port: 0
    target: intel-win-x86
    role: ocr_openvino_probe
    task_type: text_only
    ocr_capable: true
    ocr_backend: openvino
    notes: "Intel OpenVINO 资源探测：安装 openvino 并记录可用设备；OCR native OpenVINO pipeline 未接入时 BLOCKED"

  - name: sensevoice-small
    hf_repo: FunAudioLLM/SenseVoiceSmall
    quantization: int8
    port: 0                            # ONNX 本地推理（非 HTTP 端点）
    vram_estimate_gb: 1
    hardware_min: CPU
    role: asr_primary
    task_type: text_only
    asr_capable: true                  # 参与 asr 维度（中文 CER/WER/RTF）
    notes: "ASR：SenseVoice CTC（ONNX）；需 sherpa-onnx + model.onnx/tokens.txt + manifest"

  - name: sensevoice-small-amd-win
    hf_repo: FunAudioLLM/SenseVoiceSmall
    provider: local_onnx
    target: amd-win-x86
    quantization: int8
    port: 0
    vram_estimate_gb: 1
    hardware_min: CPU
    role: asr_amd_win
    task_type: text_only
    asr_capable: true
    benchmarks:
      skip: [stability, concurrency, conditioned, scenarios, conversation_drift, general_ability, translation, embedding, rerank, ocr]
    notes: "AMD Windows ASR：SenseVoice sherpa-onnx 本地 ONNX；CPU baseline，可后续接入 DirectML/RyzenAI 专用图"

  - name: sensevoice-small-intel-win
    hf_repo: FunAudioLLM/SenseVoiceSmall
    provider: local_onnx
    target: intel-win-x86
    quantization: int8
    port: 0
    vram_estimate_gb: 1
    hardware_min: CPU
    role: asr_intel_win
    task_type: text_only
    asr_capable: true
    benchmarks:
      skip: [stability, concurrency, conditioned, scenarios, conversation_drift, general_ability, translation, embedding, rerank, ocr]
    notes: "Intel Windows ASR：SenseVoice sherpa-onnx 本地 ONNX；CPU baseline，OpenVINO/NPU ASR 可作为后续专用 backend"

  # ═══ Windows AMD（Ryzen 7 8845H + Radeon 780M，Ollama Vulkan GPU 模式）═══
  #
  # 软件栈：Ollama v0.30.8 / Vulkan 后端（更新 AMD Adrenalin 驱动后解锁，2026-06-16）
  # GPU：AMD Radeon 780M iGPU，17.9 GiB 共享显存池（Vulkan，全层卸载）
  # NPU：XDNA（重启后驱动生效）；Ollama 不支持 NPU，NPU 路径见 asr 维度
  # 启动命令：set OLLAMA_HOST=0.0.0.0 && set OLLAMA_IGPU_ENABLE=1 && ollama.exe serve
  # 防火墙：TCP 11434 需放行（LAN 内访问）
  #
  # ── 设备 IP 配置（不进代码）────────────────────────────────────────────────
  # 设备 IP 通过环境变量传入；远端执行器会在 Windows 机器上注入 localhost endpoint：
  #   export OLLAMA_AMD_BASE_URL=http://<YOUR_AMD_IP>:11434/v1

  - name: llama3.2-3b-amd-win
    provider: ollama
    target: amd-win-x86
    base_url_env: OLLAMA_AMD_BASE_URL          # 优先读 env var
    model_id: llama3.2:3b
    port: 11434
    role: llm_amd_baseline
    task_type: text_only
    translation_capable: true
    notes: "AMD 780M Vulkan GPU — llama3.2:3b Q4_K_M ~2GB, TTFT p50~1078ms/p95~2050ms, TPS 28.3, PP 100 tok/s, TG 38.8 tok/s; general_ability FAIL(gsm8k=0.710/PASS, mmlu=0.390/FAIL, hellaswag=0.320/FAIL)(3-seed 2026-06-16); translation FAIL(zh->en term 55%<80%; en->zh chrF 27.6<40, term 57%<80%)(3-seed 2026-06-16)"
    benchmarks:
      ttft:
        samples: 3
        thresholds:
          p95_ttft_ms_max: 2500    # 实测 p95=2050ms (2026-06-17 E2E)；2500ms 留余量
      throughput:
        duration_s: 20
        thresholds:
          tps_min: 20              # 实测 aggregate 28.3 tok/s (2026-06-17 E2E)
      prefill_decode:
        samples: 3
        thresholds:
          tg_tps_min: 30           # 实测 decode P50=38.8 tok/s (2026-06-17 E2E)
      general_ability:
        thresholds:
          gsm8k_min: 0.55          # 实测 0.710（3-seed，2026-06-16）；PASS
          mmlu_min: 0.55           # 实测 0.390（3-seed，2026-06-16）；FAIL（3B MMLU 能力不足）
          hellaswag_min: 0.60      # 实测 0.320（3-seed，2026-06-16）；FAIL（3B 推理弱）
      translation:
        max_pairs: 10
        thresholds:
          bleu_min: 14.0           # 实测 zh->en BLEU=23.1, en->zh BLEU=29.5（3-seed，2026-06-16）；PASS
          chrf_min: 40.0           # 实测 en->zh chrF=27.6（flores）<40→FAIL（l3=33.4<40→FAIL）
          term_match_rate_min: 0.80 # 实测 zh->en term=55%, en->zh term=57%；均<80%→FAIL
      skip: [stability, concurrency, conditioned, scenarios, conversation_drift, asr, ocr, embedding, rerank]

  - name: qwen2.5-7b-amd-win
    provider: ollama
    target: amd-win-x86
    base_url_env: OLLAMA_AMD_BASE_URL
    model_id: qwen2.5:7b
    port: 11434
    role: llm_amd_primary
    task_type: text_only
    translation_capable: true
    notes: "AMD 780M Vulkan GPU — qwen2.5:7b Q4_K_M ~4.7GB; 热 TTFT P50=985ms, 吞吐13.6TPS, PP=112tok/s, TG=17tok/s; general_ability PASS (gsm8k=0.880/mmlu=0.600/hellaswag=0.790); translation FAIL(边缘: zh->en term-match 79%/80%, en->zh chrF 36.4/40) (2026-06-17 E2E)"
    benchmarks:
      ttft:
        samples: 3
        thresholds:
          p95_ttft_ms_max: 8000      # 实测 P95=6513ms（含冷起7891ms）；热 P95~1000ms
      throughput:
        duration_s: 20
        thresholds:
          tps_min: 10                # 实测 13.6 TPS (2026-06-17 E2E)
      prefill_decode:
        samples: 3
        thresholds:
          tg_tps_min: 14             # 实测 TG P50=17.0 tok/s (2026-06-17 E2E)
      general_ability:
        thresholds:
          gsm8k_min: 0.55          # 实测 gsm8k=0.880 (2026-06-17)；保留旧阈值
          mmlu_min: 0.55           # 实测 mmlu=0.600 (2026-06-17)
          hellaswag_min: 0.60      # 实测 hellaswag=0.790 (2026-06-17)
      translation:
        max_pairs: 10
        thresholds:
          bleu_min: 14.0           # 实测 zh->en l1 BLEU=27.1, l3 BLEU=56.3（2026-06-17）；均 PASS
          chrf_min: 40.0           # 实测 en->zh l1 chrF=36.4（2026-06-17）< 40.0 → FAIL
          term_match_rate_min: 0.80 # 实测 zh->en l3 term=79%（2026-06-17）< 80% → FAIL
      skip: [stability, concurrency, conditioned, scenarios, conversation_drift, asr, ocr, embedding, rerank]

  # qwen2.5:14b 需先 pull（~9GB）；16 GiB 可用应可容纳
  # - name: qwen2.5-14b-amd-win
