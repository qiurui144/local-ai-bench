# ══════════════════════════════════════════════════════
# Benchmark 矩阵（性能 + 质量多维度）
# ══════════════════════════════════════════════════════

benchmarks:
  accuracy:
    description: "Golden set 9 张图，分类+实体+事实准确性（仅 VLM）"
    skip_for_task_type: [text_only]
    golden_file: golden/expectations.json
    thresholds:
      category_precision_min: 0.80
      entity_recall_min: 0.60

  ttft:
    description: "首 token 延迟（流式）"
    samples: 5
    thresholds:
      p95_ttft_ms_max: 2000

  throughput:
    description: "Token/秒吞吐（单并发，聚合）"
    duration_s: 60
    thresholds:
      tps_min: 30

  prefill_decode:
    description: "PP(prefill) vs TG(decode) 分阶段 tok/s（llama-bench 法，流式 usage 拆分）"
    samples: 5
    decode_tokens: 128
    thresholds:
      tg_tps_min: 30                  # decode 阶段吞吐下限（产品对话体感）

  concurrency:
    description: "并发稳定性（1/5/10/30/50）"
    concurrencies: [1, 5, 10, 30, 50]
    duration_s: 60
    thresholds:
      success_rate_min: 0.95

  stability:
    description: "30 分钟连续跑，看延迟漂移"
    duration_s: 1800
    thresholds:
      latency_drift_ratio_max: 1.30

  token_budget:
    description: "input/output token 预算 + 截断率"
    thresholds:
      truncation_rate_max: 0.10

  translation:
    description: "机器翻译质量 + 延迟（zh<->en；L1 单句 / L2 上下文一致 / L3 术语）"
    # Quality metrics: SacreBLEU + chrF (CPU); COMET (GPU-only, 自动跳过)。
    flores:
      split: devtest
      num_samples: 100               # Flores-200 子集（HF facebook/flores，离线回退到内置样本）
    custom_corpus: datasets/translation/custom_zh_en.jsonl   # 产品域语料（合成，明示）
    directions: [zh->en, en->zh]
    levels: [l1, l2, l3]
    run_comet: true                  # 无 GPU 时优雅跳过，不崩
    thresholds:
      bleu_min: 20.0
      chrf_min: 40.0
      term_match_rate_min: 0.80      # L3 术语保留率
      ttft_p95_ms_max: 2000
      tps_min: 30

  embedding:
    description: "Embedding 检索质量（recall@k/MRR/nDCG@10）+ 单条延迟 p50（常驻）+ RSS 双区分 + 数值校验"
    # 仅 embedding_capable 模型参与；走 /v1/embeddings。
    corpus: datasets/retrieval/cmteb_zh_subset.jsonl   # 中文检索集（缺失则回退内置合成集，明示）
    num_samples: null                # null = 全量
    latency_samples: 12              # 常驻单条 embed 延迟 reps（取 p50）
    thresholds:
      hit_at_1_min: 0.60             # 多相关文档集用首位命中率；recall@1 仍保留为诊断指标
      recall_at_10_min: 0.90
      mrr_min: 0.70
      ndcg_at_10_min: 0.75

  rerank:
    description: "独立 Reranker 重排质量（nDCG@10/MRR）+ 单 pair 延迟（区别于 RAG 内嵌 reranker）"
    # 仅 rerank_capable 模型参与；复用 embedding 同一检索集，按 query-doc 对打分重排。
    corpus: datasets/retrieval/cmteb_zh_subset.jsonl
    num_samples: null
    thresholds:
      ndcg_at_10_min: 0.75
      mrr_min: 0.70

  ocr:
    description: "OCR 印刷文字识别 CER/NED/延迟（rapidocr / PaddleOCR / VitisAI NPU）"
    manifest: datasets/ocr/manifest.jsonl
    image_root: datasets/ocr
    num_samples: null
    # backend: auto  # auto | rapidocr | paddleocr | vitisai
    thresholds:
      cer_max: 0.10                  # 10% CER（印刷中文）
      ned_max: 0.15                  # 15% NED
      latency_p95_ms_max: 3000       # P95 ≤ 3s/图

  asr:
    description: "ASR 中文 CER/WER/RTF（SenseVoice ONNX）；缺数据集/后端时优雅 BLOCKED"
    # 仅 asr_capable 模型参与。manifest = audio + 参考文本；model_dir = sherpa-onnx 模型目录。
    manifest: datasets/asr/manifest.jsonl    # 音频不入库（PII/体积），仅 manifest 模板
    audio_root: datasets/asr
    model_dir: datasets/asr/models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17  # 2026-06-16 downloaded
    num_samples: null
    thresholds:
      cer_max: 0.15                  # 中文 CER 上限（干净语音）
      rtf_max: 1.0                   # 必须实时可用

  general_ability:
    description: "通用能力:gsm8k 数学 / mmlu 知识 / hellaswag 常识(llama_benchmark 数据集适配,pin SHA)"
    # 初始阈值 = 7B 级本地模型合理下限,首跑实测后校准;变更记 RELEASE.md(spec §11)
    tasks:
      gsm8k: {num_samples: 100, split: test}
      mmlu: {per_subject: 25, subjects: [professional_law, logical_fallacies, computer_security, elementary_mathematics]}
      hellaswag: {num_samples: 100, split: validation}
    thresholds:
      gsm8k_min: 0.55
      mmlu_min: 0.55
      hellaswag_min: 0.60

  conditioned:
    description: "条件化能力:上下文阶梯(任务质量+needle recall+TTFT/TPS 曲线)+ prefix-cache 冷热 A/B"
    context_ladder: [1024, 4096, 8192, 16384, 32768]
    needles_file: datasets/conditioned/needles.jsonl
    answer_margin_tokens: 512
    max_tokens: 64
    thresholds:
      quality_drop_warn: 0.20
      quality_drop_fail: 0.35
      needle_recall_min: 0.50

  scenarios:
    description: >
      真实场景 8 个: S1 微信截图意图(VLM) / S2 案件逻辑 / S3 自媒体知识性 /
      S4 指令遵循 / S5 结构化抽取(文本) / S6 函数调用 /
      S7 VLM 文档抽取(银行流水/增值税发票/收据/汇款凭证,requires_vlm=True) /
      S8 对抗稳健性(提示注入/锚点攻击/上下文混淆/角色混淆/边界输入)
    judge_model: null          # null = 自动取被测之外最大的 text 模型(排除 embedding/rerank/asr)
    num_cases: 50              # 每场景上限
    thresholds:                # 覆盖各场景内置 L1 阈值(可省略)
      wechat_intent: {intent_accuracy_min: 0.70, entity_recall_min: 0.60}
      case_logic: {label_accuracy_min: 0.60, finding_f1_min: 0.50}
      article_knowledge: {claim_accuracy_min: 0.60, grade_score_min: 0.50}
      instruction_following: {compliance_rate_min: 0.80}
      structured_extraction: {field_accuracy_min: 0.75}
      function_calling: {name_accuracy_min: 0.80, arg_f1_min: 0.70}
      vlm_document_extraction: {field_accuracy_min: 0.75}
      adversarial_stability: {compliance_rate_min: 0.70}
