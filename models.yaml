  # 激活：通过本地安全环境注入 K3 连接变量，再设置 K3_LLM_BASE_URL。
  # 模型：GGUF Q4_K_M 格式，已预置 /root/models/ 目录
  # 性能预期：3B ~5-10 tok/s（RVV 加速），RISC-V 纯 CPU
  # 注：旧端口 8080 已废弃（2026-06-21 更新）

  - name: qwen2.5-3b-k3-riscv
    provider: generic
    target: k3-riscv-16g
    base_url_env: K3_LLM_BASE_URL
    port: 11434
    model_id: qwen2.5-3b-instruct-q4_k_m.gguf  # actual llama-server model ID (2026-06-21)
    hardware_min: SpacemiT-K3-X100-16GB
    capabilities: [chat]
    task_type: text_only
    translation_capable: true
    benchmarks:
      ttft:
        prompt_tokens: 64
        thresholds:
          p50_ttft_ms_max: 300               # calibrated 2026-06-21 run2: warm P50≈184ms (177/178/184/197ms); 1.6x buffer
          p95_ttft_ms_max: 1200              # cold first call 1031ms included; warm P95≈197ms
      throughput:
        output_tokens: 32
        thresholds:
          tps_min: 2                          # calibrated: TG≈4.4 t/s; 2x floor with margin
      prefill_decode:
        samples: 3
        thresholds:
          pp_tps_min: 300                    # calibrated run2 (clean): PP mean≈572 t/s (545/571/602); prev ≈361 was noisy
          tg_tps_min: 4                      # calibrated run2 (clean): TG mean≈7.1 t/s (7.0/7.2/7.0); prev ≈4.4 was noisy
      general_ability:
        tasks:
          gsm8k: {num_samples: 20}
          mmlu: {per_subject: 5}
          hellaswag: {num_samples: 20}
        thresholds:
          gsm8k_min: 0.40
          mmlu_min: 0.40
          hellaswag_min: 0.40
      translation:
        thresholds:
          bleu_min: 14.0
          chrf_min: 30.0
          term_match_rate_min: 0.50
      skip: [stability, concurrency, conditioned, scenarios, embedding, rerank, asr, ocr, conversation_drift]
