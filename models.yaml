  # llava:7b — VLM 维度 benchmark（2026-06-16 pull 完成）
  - name: llava-7b-amd-win
    provider: ollama
    target: amd-win-x86
    base_url_env: OLLAMA_AMD_BASE_URL
    model_id: llava:7b
    port: 11434
    role: vlm_amd_baseline
    task_type: vlm
    is_vlm: true
    notes: "AMD 780M Vulkan — llava:7b Q4 ~4.7GB；PP=199tok/s, TG=19.8tok/s, TPS=18.1；general_ability FAIL(gsm8k=0.33/mmlu=0.48/hellaswag=0.50，VLM 不适合纯文本推理基准)；accuracy BLOCKED(VLM golden set 需图像输入) (2026-06-17 E2E)"
    benchmarks:
      ttft:
        samples: 3
        thresholds:
          p50_ttft_ms_max: 2000     # 实测 P50=829ms
          p95_ttft_ms_max: 12000    # 实测 P95=7069ms（首次加载含模型切换）
      throughput:
        duration_s: 20
        thresholds:
          tps_min: 12               # 实测 18.1 tok/s；12 为下限含余量
      prefill_decode:
        samples: 3
        thresholds:
          pp_tps_min: 100           # 实测 PP=199 tok/s
          tg_tps_min: 12            # 实测 TG=19.8 tok/s
      skip: [stability, concurrency, conditioned, scenarios, conversation_drift, general_ability, translation, asr, ocr, embedding, rerank]

  # ═══ AMD Embedding 模型（Ryzen 8845H + 780M，Ollama Vulkan）═══

  - name: qwen3-embedding-0.6b-amd
    provider: ollama
    target: amd-win-x86
    base_url_env: OLLAMA_AMD_BASE_URL
    model_id: qwen3-embedding:0.6b
    port: 11434
    role: embedding_primary
