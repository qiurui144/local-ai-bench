  # ASR on RK1820 PCIe NPU — rk-asr service（Qwen3-based ASR）
  # API: POST ${RKLLM3_ASR_BASE_URL}/asr/transcribe
  # Content-Type: audio/wav（raw WAV body，非 multipart）
  # 实测 RTF（2026-06-20）：0.040（最优）~ 0.066（一般）
  # 激活：export RKLLM3_ASR_BASE_URL=http://${RK3588_HOST}:18002

  - name: rk-asr-rk1820
    provider: generic
    port: 18002
    base_url_env: RKLLM3_ASR_BASE_URL
