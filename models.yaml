  # llava:7b — VLM 维度 benchmark（2026-06-16 pull 完成）
  - name: llava-7b-amd-win
    provider: ollama
    target: amd-win-x86
    base_url_env: OLLAMA_AMD_BASE_URL
    model_id: llava:7b
    port: 11434
    role: vlm_amd_baseline
    task_type: vlm
    is_vlm: true
    notes: "AMD 780M Vulkan — llava:7b Q4 ~4.7GB；PP=199tok/s, TG=19.8tok/s, TPS=18.1；general_ability FAIL(gsm8k=0.33/mmlu=0.48/hellaswag=0.50，VLM 不适合纯文本推理基准)；accuracy BLOCKED(VLM golden set 需图像输入) (2026-06-17 E2E)"
    benchmarks:
      ttft:
        samples: 3
        thresholds:
          p50_ttft_ms_max: 2000     # 实测 P50=829ms
          p95_ttft_ms_max: 12000    # 实测 P95=7069ms（首次加载含模型切换）
      throughput:
        duration_s: 20
        thresholds:
          tps_min: 12               # 实测 18.1 tok/s；12 为下限含余量
      prefill_decode:
        samples: 3
        thresholds:
          pp_tps_min: 100           # 实测 PP=199 tok/s
          tg_tps_min: 12            # 实测 TG=19.8 tok/s
      skip: [stability, concurrency, conditioned, scenarios, conversation_drift, general_ability, translation, asr, ocr, embedding, rerank]

  # ═══ AMD Embedding 模型（Ryzen 8845H + 780M，Ollama Vulkan）═══

  - name: qwen3-embedding-0.6b-amd
    provider: ollama
    target: amd-win-x86
    base_url_env: OLLAMA_AMD_BASE_URL
    model_id: qwen3-embedding:0.6b
    port: 11434
    role: embedding_primary
    task_type: text_only
    embedding_capable: true
    benchmarks:
      skip: [stability, concurrency, conditioned, scenarios, conversation_drift, general_ability, translation, asr, ocr]
    notes: "AMD 780M Vulkan — Qwen3-Embedding-0.6B，dim=1024"

  - name: bge-m3-amd
    provider: ollama
    target: amd-win-x86
    base_url_env: OLLAMA_AMD_BASE_URL
    model_id: bge-m3:latest
    port: 11434
    role: embedding_bge
    task_type: text_only
    embedding_capable: true
    benchmarks:
      skip: [stability, concurrency, conditioned, scenarios, conversation_drift, general_ability, translation, asr, ocr]
    # rerank_capable 已验证不可用：Ollama bge-m3 不暴露 /v1/chat/completions (2026-06-17 E2E 400)
    notes: "AMD 780M Vulkan — BGE-M3，dim=1024，多语言强基线；Ollama backend 仅 embedding，rerank 不可用"

  - name: qwen3-0.6b-amd
    provider: ollama
    target: amd-win-x86
    base_url_env: OLLAMA_AMD_BASE_URL
    model_id: qwen3:0.6b
    port: 11434
    role: llm_nano
    task_type: text_only
    translation_capable: true
    notes: "AMD 780M Vulkan — Qwen3-0.6B；TTFT P50=2367ms，TPS=79.5；general_ability FAIL(gsm8k=0.390/PASS, mmlu=0.000/FAIL, hellaswag=0.000/FAIL)(1-seed 2026-06-20, parser-fix applied — mmlu/hellaswag 0.0 is real 0.6B capability gap, not parse bug)；prefill_decode PENDING-VERIFY(Ollama qwen3不返回token_usage) (2026-06-17/06-20 E2E)"
    benchmarks:
      ttft:
        samples: 3
        thresholds:
          p50_ttft_ms_max: 3500    # 实测 P50=2367ms (2026-06-17)；3500ms 留余量
          p95_ttft_ms_max: 5000    # 实测 P95=2571ms (2026-06-17)；5000ms 留余量
      throughput:
        duration_s: 20
        thresholds:
          tps_min: 50              # 实测 79.5 tok/s (2026-06-17)；50 为下限含余量
      prefill_decode:
        samples: 3
        thresholds:
          pp_tps_min: 30           # PENDING-VERIFY: Ollama qwen3 不返回 usage，1/5 样本，实测 48.5 tok/s 不可信
          # tg_tps_min: PENDING — TG=8533 tok/s 是 Ollama qwen3 usage bug，不可作阈值
      general_ability:
        thresholds:
          gsm8k_min: 0.30          # 实测 0.390（parser-fix，1-seed 2026-06-20）；PASS
          mmlu_min: 0.30           # 实测 0.000（parser-fix 后仍为 0.0 — 0.6B MCQ 能力不足）；FAIL
          hellaswag_min: 0.35      # 实测 0.000（parser-fix 后仍为 0.0 — 0.6B MCQ 能力不足）；FAIL
      skip: [stability, concurrency, conditioned, scenarios, conversation_drift, translation, asr, ocr, embedding, rerank]

  - name: bge-reranker-base-amd-win
    provider: local_reranker
    target: amd-win-x86
    model_id: BAAI/bge-reranker-base
    port: 0
    role: reranker_amd_win_cross_encoder
    task_type: text_only
    rerank_capable: true
    rerank_native: true
    benchmarks:
      rerank:
        num_samples: 6
      skip: [stability, concurrency, conditioned, scenarios, conversation_drift, general_ability, translation, asr, ocr, embedding]
    notes: "AMD Windows 专用 reranker：BAAI/bge-reranker-base CrossEncoder，本地进程内专用重排；替代 LLM yes/no 代理"

  - name: bge-reranker-v2-m3-amd-win
    provider: local_reranker
    target: amd-win-x86
    model_id: BAAI/bge-reranker-v2-m3
    port: 0
    role: reranker_amd_win_cross_encoder_stronger
    task_type: text_only
    rerank_capable: true
    rerank_native: true
    benchmarks:
      rerank:
        num_samples: 6
      skip: [stability, concurrency, conditioned, scenarios, conversation_drift, general_ability, translation, asr, ocr, embedding]
    notes: "AMD Windows 专用 reranker：BAAI/bge-reranker-v2-m3 CrossEncoder，高精度专用重排"

  - name: qwen2.5-14b-amd-win
    provider: ollama
    target: amd-win-x86
    base_url_env: OLLAMA_AMD_BASE_URL
    model_id: qwen2.5:14b
    port: 11434
    role: llm_amd_win_parameter_uplift
    task_type: text_only
    translation_capable: true
    benchmarks:
      ttft:
