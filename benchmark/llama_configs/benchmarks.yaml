# Benchmark 参数与指标阈值配置

llm:
  mmlu:
    enabled: true
    num_samples: 500          # null = 全量约 14k 题（耗时较长）
    few_shot: 5
    dataset_path: null        # null = 自动从 HuggingFace 下载 cais/mmlu
    thresholds:
      accuracy:
        min_value: 0.60       # 低于 60% 标记 FAIL

  gsm8k:
    enabled: true
    num_samples: 200
    few_shot: 8
    dataset_path: null
    thresholds:
      accuracy:
        min_value: 0.50

  hellaswag:
    enabled: true
    num_samples: 500
    few_shot: 0
    dataset_path: null
    thresholds:
      accuracy:
        min_value: 0.65

  truthfulqa:
    enabled: false            # 需要额外依赖，默认关闭

  performance:
    enabled: true
    num_warmup_requests: 3
    num_test_requests: 10
    prompt_lengths: [128, 512]
    output_lengths: [128, 256]
    thresholds:
      ttft_ms:
        max_value: 2000       # TTFT P99 不超过 2000ms
      tpot_ms:
        max_value: 100        # 每 token 不超过 100ms
      throughput_tps:
        min_value: 5          # 至少 5 tokens/s

whisper:
  wer_cer:
    enabled: true
    num_samples: 100
    dataset_path: null        # null = 自动下载 LibriSpeech
    thresholds:
      wer:
        max_value: 0.10       # WER 不超过 10%
      cer:
        max_value: 0.05
  dataset: "librispeech"
  language: "en"
  beam_size: 5

embedding:
  retrieval:
    enabled: true
    num_samples: 100
    thresholds:
      ndcg_at_10:
        min_value: 0.50
  similarity:
    enabled: true
    thresholds:
      spearman_cosine:
        min_value: 0.70
  mteb_tasks:              # 空列表 = 使用默认数据集
    - "NQ"

rerank:
  beir_datasets:
    - "nfcorpus"           # 轻量数据集，适合快速验证
  k_values: [1, 3, 5, 10]
  tasks:
    enabled: true
    num_samples: 50
    thresholds:
      ndcg_at_10:
        min_value: 0.60

docling:
  parse_accuracy:
    enabled: true
    dataset_path: null     # 需要自备测试集（含 document + annotation.json）
    thresholds:
      field_f1:
        min_value: 0.85
      cell_f1:
        min_value: 0.80

  throughput:
    enabled: true
    num_samples: 10        # 合成文档数量（无 dataset_path 时自动生成）
    dataset_path: null     # 指定真实文档目录可获得更准确的测试
    thresholds:
      throughput_pages_per_sec:
        min_value: 0.5     # 单并发至少 0.5 pages/s（GPU 通常 2-10 pages/s）
    extra:
      pages_per_doc: 5                # 每份合成文档页数
      concurrency_levels: [1, 4, 8]   # 测试的并发度列表

  table_extraction:
    enabled: true
  document_types:
    - "pdf"
    - "docx"

speaker:
  diarization:
    enabled: true
    num_samples: null            # null = 全量（AMI test 约 16 段会议）
    dataset_path: null           # null = 自动下载 Edinburgh/ami 或使用内置样本
    thresholds:
      der:
        max_value: 0.25          # DER 不超过 25%（工业常见标准）
      missed_speech:
        max_value: 0.10
      false_alarm:
        max_value: 0.05
      speaker_confusion:
        max_value: 0.15

  verification:
    enabled: false               # 需要额外 trial pairs 数据，默认关闭
    num_samples: 200
    dataset_path: null
    thresholds:
      eer:
        max_value: 0.10          # EER 不超过 10%

  # 评测数据集名称列表（多数据集会合并计算宏平均 DER）
  datasets:
    - "ami"                      # 英文会议（最常用基准）
  # - "aishell4"                 # 中文会议（需自备或下载 AISHELL-4）
  # - "callhome"                 # 电话场景（2人对话）

  collar: 0.25                   # NIST 标准边界忽略时间窗（秒）
  skip_overlap: false            # 是否跳过重叠语音计算 DER

# ── 全链路瓶颈分析（Profiling）──────────────────────────────────────────────
# enabled: false 时不影响现有测试；改为 true 时额外执行（L1-L7 全链路分析）：
#   L1/L2: ISA 特性检测（/proc/cpuinfo flags / RVV / AVX / NEON）+ 内核状态
#   L3-L5: 工具链溯源（libc / BLAS / ggml 编译标志 / RVV/AVX kernel 符号）
#   L6:    perf 性能计数器（IPC / L3 cache miss / branch misprediction）
#   L7:    并发压测 + context scaling + 持续负载（热降频）+ prefill/decode TPS 分离
profiling:
  enabled: false
  sample_interval_ms: 100        # ResourceMonitor 采样间隔（ms）
  concurrency_levels: [1, 2, 4, 8]
  stress_requests_per_level: 12  # 每个并发度的请求数量
  # Context Length 扩展曲线（检测 O(n²) attention）
  context_lengths: [128, 512, 1024, 2048, 4096, 8192]
  context_scaling_output_tokens: 64
  # 持续负载测试（热降频检测）
  sustained_load_duration_s: 60  # 持续时间（秒）
  sustained_load_window_s: 10    # 统计窗口（秒）
  # perf 性能计数器（需要: echo 1 | sudo tee /proc/sys/kernel/perf_event_paranoid）
  perf_enabled: false
