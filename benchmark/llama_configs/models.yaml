# Ollama 服务连接配置（主后端）
ollama:
  base_url: "http://localhost:11434"
  timeout_seconds: 300

# 全局配置
global:
  output_dir: "outputs"
  log_level: "INFO"
  seed: 42
  parallel_workers: 1
  timeout_seconds: 3600

# ─────────────────────────────────────────────────────────────────────────────
# 模型定义列表
#
# 取消注释需要的模型，确保对应后端已安装并且模型权重已下载。
# ─────────────────────────────────────────────────────────────────────────────
models:

  # ═══════════════════════════════════════════════════════════════════════════
  # LLM 模型
  # 用于硬件选型时重点关注：TTFT / TPOT / throughput_tps @各并发
  # ═══════════════════════════════════════════════════════════════════════════

  # ── 方案 A：Ollama（主推，自动适配 CPU AVX2/512 / CUDA / ROCm / Metal）──
  - name: "qwen2.5-7b-ollama"
    type: llm
    backend: ollama
    ollama_model: "qwen2.5:7b-instruct"
    context_length: 32768
    hardware: auto

  # ── 方案 B：vLLM（NVIDIA GPU 高吞吐，PagedAttention）──────────────────────
  # 启动：vllm serve Qwen/Qwen2.5-7B-Instruct --port 8000
  # - name: "qwen2.5-7b-vllm"
  #   type: llm
  #   backend: openai_compatible
  #   openai_base_url: "http://localhost:8000/v1"
  #   openai_model: "Qwen/Qwen2.5-7B-Instruct"
  #   openai_api_key: "EMPTY"

  # ── 方案 C：LMDeploy（NVIDIA/CPU，量化友好）─────────────────────────────
  # 启动：lmdeploy serve api_server Qwen/Qwen2.5-7B-Instruct --server-port 23333
  # - name: "qwen2.5-7b-lmdeploy"
  #   type: llm
  #   backend: openai_compatible
  #   openai_base_url: "http://localhost:23333/v1"
  #   openai_model: "Qwen/Qwen2.5-7B-Instruct"

  # ── 方案 D：SGLang（高并发，RadixAttention）──────────────────────────────
