  # - name: "qwen2.5-7b-sglang"
  #   type: llm
  #   backend: openai_compatible
  #   openai_base_url: "http://localhost:30000/v1"
  #   openai_model: "Qwen/Qwen2.5-7B-Instruct"

  # ── 方案 E：llama.cpp 直连（RISC-V/RVV Fallback）────────────────────────
  # - name: "qwen2.5-7b-llamacpp"
